version: '3.9'

# ══════════════════════════════════════════════════
# ENGERIS ONE — Docker Compose (Desenvolvimento)
# Plataforma ERP Modular Multi-Indústria
# ENGERIS — engeris.co.ao
# ══════════════════════════════════════════════════

networks:
  engeris-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
  prometheus_data:

services:

  # ── BASE DE DADOS ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: engeris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-engeris_one_db}
      POSTGRES_USER: ${DATABASE_USER:-engeris}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - engeris-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-engeris}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: engeris-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - engeris-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MINIO (Ficheiros) ───────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: engeris-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - engeris-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── API (Fastify) ───────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/api.Dockerfile
      target: development
    container_name: engeris-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - ./packages:/packages
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - engeris-network
    command: pnpm dev

  # ── WEB (Next.js) ───────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/web.Dockerfile
      target: development
    container_name: engeris-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - ./packages:/packages
      - /app/node_modules
    depends_on:
      - api
    networks:
      - engeris-network
    command: pnpm dev

  # ── GRAFANA (Monitorização) ─────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: engeris-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/docker/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - engeris-network

  # ── PROMETHEUS ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: engeris-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - engeris-network
