name: Deploy

on:
  push:
    branches: [staging, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy-staging:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    environment: staging

    steps:
      - name: Deploy via SSH to staging VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/sea-and-soul
            git fetch origin staging
            git checkout staging
            git pull origin staging

            # Build and deploy containers
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d

            # Wait for API container to be healthy
            sleep 10

            # Run database migrations
            docker compose -f docker-compose.prod.yml exec -T api pnpm db:migrate:prod

            echo "Staging deploy completed successfully"

  deploy-production:
    name: Deploy to Production
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH to production VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/sea-and-soul
            git fetch origin main
            git checkout main
            git pull origin main

            # Build and deploy containers
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d

            # Wait for API container to be healthy
            sleep 10

            # Run database migrations
            docker compose -f docker-compose.prod.yml exec -T api pnpm db:migrate:prod

            echo "Production deploy completed successfully"
