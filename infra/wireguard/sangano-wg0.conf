# ── WireGuard Sangano (Peer) ────────────────────────────────────────────────
# Mini PC local no resort Sangano (ligação instável — keepalive reduzido)

[Interface]
Address = 10.0.0.3/32
PrivateKey = <SANGANO_PRIVATE_KEY>
DNS = 1.1.1.1, 8.8.8.8

[Peer]
PublicKey = <VPS_PUBLIC_KEY>
Endpoint = <VPS_PUBLIC_IP>:51820
AllowedIPs = 10.0.0.0/24, 172.20.0.0/16
# Sangano tem ligação instável — keepalive mais agressivo
PersistentKeepalive = 15
