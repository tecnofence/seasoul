# ── WireGuard VPS (Hub) ─────────────────────────────────────────────────────
# Nó central que conecta os 2 resorts à cloud (Hetzner VPS)
# Substituir <...> pelos valores reais antes de usar

[Interface]
# IP do VPS na rede VPN
Address = 10.0.0.1/24
# Porta WireGuard (UDP)
ListenPort = 51820
# Chave privada do VPS (gerada com: wg genkey)
PrivateKey = <VPS_PRIVATE_KEY>
# Ativar IP forwarding entre peers
PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# ── Peer: Cabo Ledo Resort ──────────────────────────────────────────────────
[Peer]
# Chave pública do servidor local de Cabo Ledo
PublicKey = <CABO_LEDO_PUBLIC_KEY>
# IP fixo atribuído a Cabo Ledo na VPN
AllowedIPs = 10.0.0.2/32
# Manter ligação ativa (heartbeat a cada 25s)
PersistentKeepalive = 25

# ── Peer: Sangano Resort ────────────────────────────────────────────────────
[Peer]
# Chave pública do servidor local de Sangano
PublicKey = <SANGANO_PUBLIC_KEY>
# IP fixo atribuído a Sangano na VPN
AllowedIPs = 10.0.0.3/32
PersistentKeepalive = 25
