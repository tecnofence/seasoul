# ── WireGuard Cabo Ledo (Peer) ──────────────────────────────────────────────
# Mini PC local no resort Cabo Ledo
# Substituir <...> pelos valores reais

[Interface]
Address = 10.0.0.2/32
PrivateKey = <CABO_LEDO_PRIVATE_KEY>
DNS = 1.1.1.1, 8.8.8.8

[Peer]
# VPS Hetzner (servidor hub)
PublicKey = <VPS_PUBLIC_KEY>
# Endpoint público do VPS
Endpoint = <VPS_PUBLIC_IP>:51820
# Rotear tráfego da rede interna pelo VPN
AllowedIPs = 10.0.0.0/24, 172.20.0.0/16
PersistentKeepalive = 25
