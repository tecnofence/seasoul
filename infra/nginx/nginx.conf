# ══════════════════════════════════════════════════
# ENGERIS ONE — Nginx Config (Produção)
# Plataforma ERP Modular Multi-Indústria
# ══════════════════════════════════════════════════

# Redirecionar HTTP → HTTPS
server {
    listen 80;
    server_name app.engeris.ao staging.engeris.co.ao;
    return 301 https://$host$request_uri;
}

# ── WEB (Next.js) ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.engeris.ao;

    ssl_certificate /etc/letsencrypt/live/app.engeris.ao/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.engeris.ao/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── API (Fastify) ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.engeris.ao;

    ssl_certificate /etc/letsencrypt/live/api.engeris.ao/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.engeris.ao/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req zone=api burst=20 nodelay;

    location / {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
